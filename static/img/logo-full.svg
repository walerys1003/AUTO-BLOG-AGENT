<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" width="280" height="64" role="img" aria-label="MasterContentAI">
  <defs>
    <linearGradient id="mc-full-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#182648"/>
      <stop offset="55%" stop-color="#3231b8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="mc-full-stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#cffafe" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="mc-full-ai" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#4f57f0"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Mark (squircle 56x56, padded 4px) -->
  <g transform="translate(4 4)">
    <rect width="56" height="56" rx="14" ry="14" fill="url(#mc-full-bg)"/>
    <rect width="56" height="28" rx="14" ry="14" fill="white" opacity="0.06"/>
    <g fill="none" stroke="url(#mc-full-stroke)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 41 L11 16 L20 28 L29 16 L29 41"/>
      <path d="M46 19 A11 11 0 1 0 46 37"/>
    </g>
    <circle cx="46" cy="19" r="2.2" fill="#22d3ee"/>
  </g>

  <!-- Wordmark -->
  <g font-family="Inter, -apple-system, 'Segoe UI', sans-serif" font-weight="700" letter-spacing="-0.02em">
    <text x="76" y="38" font-size="20" fill="#0f172a">MasterContent</text>
    <text x="223" y="38" font-size="20" fill="url(#mc-full-ai)">AI</text>
  </g>
  <text x="76" y="52" font-family="Inter, -apple-system, 'Segoe UI', sans-serif" font-size="9" font-weight="600" fill="#64748b" letter-spacing="0.18em">CONTENT WORKFLOW PLATFORM</text>
