<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="MasterContentAI">
  <defs>
    <linearGradient id="mc-mark-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#182648"/>
      <stop offset="55%" stop-color="#3231b8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="mc-mark-stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#cffafe" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="mc-mark-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Squircle background -->
  <rect x="2" y="2" width="60" height="60" rx="16" ry="16" fill="url(#mc-mark-bg)"/>

  <!-- Subtle highlight on top edge -->
  <rect x="2" y="2" width="60" height="30" rx="16" ry="16" fill="white" opacity="0.06"/>

  <!-- MC monogram: M peaks + C arc -->
  <g filter="url(#mc-mark-glow)" fill="none" stroke="url(#mc-mark-stroke)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- M -->
    <path d="M14 46 L14 18 L24 32 L34 18 L34 46"/>
    <!-- C, opening right -->
    <path d="M52 22 A12 12 0 1 0 52 42"/>
  </g>

  <!-- Accent dot on C tip -->
  <circle cx="52" cy="22" r="2.4" fill="#22d3ee"/>
</svg>
